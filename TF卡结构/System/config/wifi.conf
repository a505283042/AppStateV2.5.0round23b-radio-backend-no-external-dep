# 复制到 SD 卡：/System/config/wifi.conf
# 支持多个网络，按顺序依次尝试连接。
# 普通 Wi-Fi 只需要 ssid/password。
# 隐藏 Wi-Fi 建议同时填写 hidden（隐藏）/channel（频道）/bssid（热点标识）。


hostname=esp32s3-player

[network]
ssid=wifi名字
password=wifi密码

[network]
ssid=OfficeHidden
password=your_password_here
hidden=1
channel=6
bssid=AA:BB:CC:DD:EE:FF
